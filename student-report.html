<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="pageTitleStudentReport">تقرير الطالب - Hather</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      min-height:100vh;
      font-family:"Cairo", sans-serif;
      background:linear-gradient(135deg,#062716,#0f5a34);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .card{
      width:min(520px,92vw);
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.15);
      border-radius:22px;
      padding:22px;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
      backdrop-filter:blur(12px);
    }
    h1{
      margin:0 0 10px;
      font-size:20px;
      font-weight:800;
      text-align:center;
    }
    p{
      margin:0 0 18px;
      text-align:center;
      opacity:.85;
      font-size:14px;
    }
    label{
      font-size:13px;
      margin-bottom:6px;
      display:block;
    }
    input{
      width:100%;
      padding:14px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.2);
      background:rgba(0,0,0,.25);
      color:#fff;
      font-size:15px;
      outline:none;
    }
    button{
      width:100%;
      margin-top:14px;
      padding:14px;
      border-radius:16px;
      border:none;
      background:linear-gradient(135deg,#18c26b,#11a85b);
      color:#06210f;
      font-weight:900;
      font-size:15px;
      cursor:pointer;
    }
    button:hover{ opacity:.9; }

    .status{
      margin-top:12px;
      padding:10px;
      border-radius:14px;
      font-size:13px;
      display:none;
    }
    .status.show{ display:block; }
    .status.ok{ background:rgba(82,255,162,.15); border:1px solid rgba(82,255,162,.4); }
    .status.bad{ background:rgba(255,93,93,.15); border:1px solid rgba(255,93,93,.4); }

    table{
      width:100%;
      margin-top:16px;
      border-collapse:collapse;
      font-size:13px;
    }
    th,td{
      padding:10px;
      border-bottom:1px solid rgba(255,255,255,.15);
      text-align:center;
    }
    th{ font-weight:800; opacity:.9; }

    .summary{
      display:flex;
      gap:10px;
      margin-top:16px;
      justify-content:space-between;
      font-size:13px;
    }
    .pill{
      flex:1;
      padding:10px;
      border-radius:14px;
      text-align:center;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.15);
    }
  </style>
</head>

<body>

<div class="card">
  <h1 data-i18n="reportTitle">تقرير الحضور</h1>
  <p data-i18n="reportSub">أدخل رقمك الجامعي لعرض سجل حضورك</p>

  <label data-i18n="uniIdLabel">الرقم الجامعي</label>
  <input id="studentId" data-i18n-placeholder="uniIdPh" placeholder="مثال: 441012345"/>

  <button onclick="loadReport()" data-i18n="showReport">عرض التقرير</button>

  <div id="status" class="status"></div>

  <div id="summary" class="summary" style="display:none">
    <div class="pill"><span data-i18n="present">حضور</span>: <b id="sPresent">0</b></div>
    <div class="pill"><span data-i18n="late">تأخير</span>: <b id="sLate">0</b></div>
    <div class="pill"><span data-i18n="absent">غياب</span>: <b id="sAbsent">0</b></div>
  </div>

  <table id="table" style="display:none">
    <thead>
      <tr>
        <th>LectureID</th>
        <th data-i18n="time">الوقت</th>
        <th data-i18n="status">الحالة</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
</div>

<script src="assets/i18n.js"></script>
<script src="assets/app.js"></script>
<script>
  applyLang();
  const $ = (id)=>document.getElementById(id);

  function showStatus(type,msg){
    const s = $("status");
    s.className = "status show " + type;
    s.textContent = msg;
  }

  async function loadReport(){
    const studentId = $("studentId").value.trim();
    if(!studentId){
      showStatus("bad", t("enterUniId"));
      return;
    }

    showStatus("ok", t("reportLoading"));
    $("table").style.display="none";
    $("summary").style.display="none";

    try{
      const res = await fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
          action:"studentReport",
          studentId
        })
      }).then(r=>r.json());

      if(!res || !res.ok){
        throw new Error(res?.error || t("reportFailFetch"));
      }

      const d = res.data;
      $("sPresent").textContent = d.present;
      $("sLate").textContent = d.late;
   

      $("summary").style.display="flex";

      const rows = d.rows || [];
      $("rows").innerHTML = rows.map(r=>`
        <tr>
          <td>${r.lectureId}</td>
          <td>${r.time}</td>
          <td>${r.status}</td>
        </tr>
      `).join("");

      $("table").style.display = rows.length ? "table" : "none";
      showStatus("ok", t("reportLoaded"));
    }catch(e){
      showStatus("bad", e.message);
    }
  }
</script>

</body>
</html>
